<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktif Elektronegativitas & Ikatan Kimia</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --primary: #2c3e50;
            --accent: #3498db;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--primary); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 950px; width: 100%; }
        
        /* Layout Tabel Periodik */
        .periodic-table { display: grid; grid-template-columns: repeat(18, 1fr); gap: 6px; margin-bottom: 30px; overflow-x: auto; padding: 10px; }
        .element { aspect-ratio: 1/1.2; border: 1px solid #ddd; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; position: relative; background: #fff; }
        .element:hover { transform: scale(1.15); z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.2); border-color: #333; }
        .element.active { border: 3px solid #333; transform: scale(1.1); box-shadow: 0 0 10px rgba(0,0,0,0.3); }
        
        .symbol { font-size: 1.2rem; font-weight: bold; }
        .number { font-size: 0.6rem; position: absolute; top: 2px; left: 4px; }
        .en-val { font-size: 0.75rem; font-weight: 600; margin-top: 2px; }

        /* Pewarnaan Berdasarkan Sumber [1] */
        .low { background-color: #ffff00; }     /* Kuning: 0.7 - 1.2 */
        .mid { background-color: #ffcc00; }     /* Oranye Muda: 1.3 - 1.9 */
        .mid-high { background-color: #ff6600; color: white; } /* Oranye: 2.0 - 2.8 */
        .high { background-color: #ff0000; color: white; }    /* Merah: 3.0 - 4.0 */
        .noble { background-color: #f1f1f1; color: #3498db; }  /* Gas Mulia */
        .empty { visibility: hidden; }

        /* Hasil Simulasi */
        .result-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #f1f3f5; padding: 25px; border-radius: 15px; border: 2px solid #dee2e6; }
        .selected-info { font-size: 1.1rem; }
        .bond-info { text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 2px solid #dee2e6; }
        .badge { padding: 8px 16px; border-radius: 20px; color: white; font-weight: bold; margin-top: 10px; font-size: 0.9rem; }
        .formula { font-size: 2rem; font-weight: bold; color: #2c3e50; margin: 10px 0; }
    </style>
</head>
<body>

<div class="header">
    <h1>E-Chem: Simulasi Elektronegativitas</h1>
    <p>Berdasarkan skala Pauling. Pilih dua unsur untuk memprediksi senyawa & kepolaran.</p>
</div>

<div class="container">
    <div id="table" class="periodic-table"></div>

    <div class="result-panel" id="result">
        <div class="selected-info" id="info-text">
            <p><strong>Cara Penggunaan:</strong></p>
            <ul>
                <li>Klik unsur pertama (Logam/Non-Logam).</li>
                <li>Klik unsur kedua untuk melihat reaksi.</li>
            </ul>
        </div>
        <div class="bond-info" id="bond-display">
            <div style="color: #666; font-style: italic;">Hasil analisis akan muncul di sini</div>
        </div>
    </div>
</div>

<script>
// Data Unsur berdasarkan sumber [1]
const elements = [
    // Baris 1
    { n: 1, s: "H", en: 2.1, r: 1, c: 1, v: 1 }, { n: 2, s: "He", en: 0, r: 1, c: 18, v: 0 },
    // Baris 2
    { n: 3, s: "Li", en: 1.0, r: 2, c: 1, v: 1 }, { n: 4, s: "Be", en: 1.5, r: 2, c: 2, v: 2 },
    { n: 5, s: "B", en: 2.0, r: 2, c: 13, v: 3 }, { n: 6, s: "C", en: 2.5, r: 2, c: 14, v: 4 },
    { n: 7, s: "N", en: 3.0, r: 2, c: 15, v: 3 }, { n: 8, s: "O", en: 3.5, r: 2, c: 16, v: 2 },
    { n: 9, s: "F", en: 4.0, r: 2, c: 17, v: 1 }, { n: 10, s: "Ne", en: 0, r: 2, c: 18, v: 0 },
    // Baris 3
    { n: 11, s: "Na", en: 0.9, r: 3, c: 1, v: 1 }, { n: 12, s: "Mg", en: 1.2, r: 3, c: 2, v: 2 },
    { n: 13, s: "Al", en: 1.5, r: 3, c: 13, v: 3 }, { n: 14, s: "Si", en: 1.8, r: 3, c: 14, v: 4 },
    { n: 15, s: "P", en: 2.1, r: 3, c: 15, v: 3 }, { n: 16, s: "S", en: 2.5, r: 3, c: 16, v: 2 },
    { n: 17, s: "Cl", en: 3.0, r: 3, c: 17, v: 1 }, { n: 18, s: "Ar", en: 0, r: 3, c: 18, v: 0 },
    // Baris 4 (Hanya K, Ca, Br)
    { n: 19, s: "K", en: 0.8, r: 4, c: 1, v: 1 }, { n: 20, s: "Ca", en: 1.0, r: 4, c: 2, v: 2 },
    { n: 35, s: "Br", en: 2.8, r: 4, c: 17, v: 1 },
    // Baris 5 (Rb, Sr, I)
    { n: 37, s: "Rb", en: 0.8, r: 5, c: 1, v: 1 }, { n: 38, s: "Sr", en: 1.0, r: 5, c: 2, v: 2 },
    { n: 53, s: "I", en: 2.5, r: 5, c: 17, v: 1 },
    // Baris 6 (Cs, Ba)
    { n: 55, s: "Cs", en: 0.7, r: 6, c: 1, v: 1 }, { n: 56, s: "Ba", en: 0.9, r: 6, c: 2, v: 2 }
];

let selected = [];
let nodes = [];

function getColorClass(en) {
    if (en === 0) return 'noble';
    if (en <= 1.2) return 'low';
    if (en <= 1.9) return 'mid';
    if (en <= 2.8) return 'mid-high';
    return 'high';
}

function init() {
    const table = document.getElementById('table');
    for (let r = 1; r <= 6; r++) {
        for (let c = 1; c <= 18; c++) {
            const el = elements.find(e => e.r === r && e.c === c);
            const div = document.createElement('div');
            if (el) {
                div.className = `element ${getColorClass(el.en)}`;
                div.innerHTML = `<span class="number">${el.n}</span><span class="symbol">${el.s}</span><span class="en-val">${el.en || '-'}</span>`;
                div.onclick = () => select(el, div);
            } else {
                div.className = 'empty';
            }
            table.appendChild(div);
        }
    }
}

function select(el, node) {
    if (el.en === 0) return alert("Gas mulia cenderung tidak bereaksi.");
    
    if (selected.length >= 2) {
        nodes.forEach(n => n.classList.remove('active'));
        selected = []; nodes = [];
    }

    selected.push(el);
    nodes.push(node);
    node.classList.add('active');

    if (selected.length === 2) calculate();
}

function getFormula(e1, e2) {
    // Logika sederhana penentuan rumus berdasarkan valensi
    let v1 = e1.v, v2 = e2.v;
    if (e1.s === e2.s) return `${e1.s}<sub>2</sub>`;
    
    // Sederhanakan FPB jika bisa (misal 2:2 jadi 1:1)
    const gcd = (a, b) => b ? gcd(b, a % b) : a;
    const common = gcd(v1, v2);
    v1 /= common; v2 /= common;
    
    let f1 = v2 === 1 ? "" : v2;
    let f2 = v1 === 1 ? "" : v1;
    return `${e1.s}<sub>${f1}</sub>${e2.s}<sub>${f2}</sub>`;
}

function calculate() {
    const [a, b] = selected;
    const diff = Math.abs(a.en - b.en).toFixed(1);
    
    let bond, polarity, color;
    if (diff >= 1.7) {
        bond = "IKATAN IONIK";
        polarity = "Sangat Polar (Ionik)";
        color = "#e74c3c";
    } else if (diff >= 0.5) {
        bond = "IKATAN KOVALEN";
        polarity = "Kovalen Polar";
        color = "#f39c12";
    } else {
        bond = "IKATAN KOVALEN";
        polarity = a.s === b.s ? "Non-Polar (Murni)" : "Kovalen Non-Polar";
        color = "#27ae60";
    }

    document.getElementById('info-text').innerHTML = `
        <p><strong>Unsur terpilih:</strong></p>
        <p>${a.s} (EN: ${a.en}) & ${b.s} (EN: ${b.en})</p>
        <p><strong>Perbedaan EN (ΔEN):</strong> ${diff}</p>
        <p><strong>Kepolaran:</strong> ${polarity}</p>
    `;

    document.getElementById('bond-display').innerHTML = `
        <div style="font-size:0.9rem; color:#666;">Rumus Senyawa Umum:</div>
        <div class="formula">${getFormula(a, b)}</div>
        <div class="badge" style="background-color:${color}">${bond}</div>
    `;
}

init();
</script>
</body>
</html>
